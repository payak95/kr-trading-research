name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Run test scripts
        # 테스트는 pytest 스타일이 아니라 `python tests/test_X.py` 실행형(assert 기반) 스크립트
        run: |
          set -e
          for f in tests/test_*.py; do python "$f"; done
